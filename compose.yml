services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    command: uv run taskiq worker judge.tasks.broker:broker judge.tasks.grade_pr
    depends_on:
      - redis

volumes:
  redis-data:
